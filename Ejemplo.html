<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Que Pedo mi Selmitan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --accent: #e8c84a;
      --mid: #1a1a1a;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }
 
    /* Custom cursor */
    .cursor {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s, height 0.2s;
      mix-blend-mode: difference;
    }
 
    /* ─── LOGO TOP LEFT ─── */
    .logo-corner {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeDown 0.8s ease both;
    }
 
    .logo-corner img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: invert(0) brightness(1);
    }
 
    /* ─── NOISE TEXTURE overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }
 
    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 120px 40px 60px;
      text-align: center;
    }
 
    /* Big decorative circle behind text */
    .hero::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 1px solid rgba(232,200,74,0.08);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotateSlow 30s linear infinite;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 380px; height: 380px;
      border-radius: 50%;
      border: 1px solid rgba(232,200,74,0.12);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotateSlow 20s linear infinite reverse;
    }
 
    /* QUE PEDO headline */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 200px);
      line-height: 0.88;
      letter-spacing: -2px;
      color: var(--white);
      position: relative;
      z-index: 2;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.2s both;
    }
 
    .headline span {
      display: block;
      color: var(--accent);
      font-size: clamp(60px, 12vw, 140px);
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.4s both;
    }
 
    /* MI SELMITAN subtitle */
    .sub {
      margin-top: 28px;
      font-size: clamp(18px, 3.5vw, 36px);
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,245,240,0.55);
      position: relative;
      z-index: 2;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.6s both;
    }
 
    /* Divider line */
    .divider {
      width: 80px;
      height: 2px;
      background: var(--accent);
      margin: 40px auto;
      position: relative;
      z-index: 2;
      animation: expandLine 0.8s ease 0.9s both;
    }
 
    /* Body copy */
    .body-text {
      max-width: 480px;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 400;
      line-height: 1.7;
      color: rgba(245,245,240,0.6);
      position: relative;
      z-index: 2;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 1s both;
    }
 
    .body-text strong {
      color: var(--accent);
      font-weight: 700;
    }
 
    /* CTA button */
    .cta {
      margin-top: 48px;
      display: inline-block;
      padding: 16px 40px;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.15em;
      text-decoration: none;
      position: relative;
      z-index: 2;
      overflow: hidden;
      transition: color 0.3s;
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 1.1s both;
    }
 
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(.16,1,.3,1);
      z-index: -1;
    }
    .cta:hover::before { transform: translateX(0); }
    .cta:hover { color: var(--black); }
 
    /* Floating dots decoration */
    .dots {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
 
    .dot {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: floatDot var(--dur) ease-in-out var(--delay) infinite;
    }
 
    /* ─── BOTTOM STRIP ─── */
    .strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
 
    /* ─── KEYFRAMES ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandLine {
      from { width: 0; }
      to   { width: 80px; }
    }
    @keyframes rotateSlow {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    @keyframes floatDot {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      20%  { opacity: 0.7; }
      80%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
  </style>
</head>
<body>
 
  <div class="cursor" id="cursor"></div>
 
  <!-- LOGO TOP LEFT -->
  <header class="logo-corner">
    <img src="https://slproduce.mx/wp-content/uploads/2024/03/LOGO-SL-GROUP.png" alt="SL Group Logo" />
  </header>
 
  <!-- FLOATING DOTS -->
  <div class="dots" id="dots"></div>
 
  <!-- HERO SECTION -->
  <main class="hero">
    <h1 class="headline">
      Que Pedo
      <span>mi Selmitan</span>
    </h1>
    <p class="sub">Bienvenido al lugar más chido</p>
    <div class="divider"></div>
    <p class="body-text">
      Aquí todo está <strong>bien cañón</strong>. SL Group te da la bienvenida
      con todo el sabor y la vibra de siempre.<br/>
      Échate un taco, relájate, ya llegaste.
    </p>
    <a href="#" class="cta">Entrarle al Cotorreo</a>
  </main>
 
  <div class="strip"></div>
 
  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
 
    // Generate floating dots
    const dotsContainer = document.getElementById('dots');
    for (let i = 0; i < 20; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.left   = Math.random() * 100 + 'vw';
      d.style.bottom = (Math.random() * 30) + 'px';
      d.style.setProperty('--dur',   (4 + Math.random() * 6) + 's');
      d.style.setProperty('--delay', (Math.random() * 8) + 's');
      dotsContainer.appendChild(d);
    }
  </script>
</body>
</html>
